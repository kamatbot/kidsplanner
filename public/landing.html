<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fam ETC — the etcetera hub for your family</title>
  <meta name="description" content="School calendars, homework, activities, goals, and family chat in one place.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="auth-bg">
  <div class="auth-blob auth-blob-1"></div>
  <div class="auth-blob auth-blob-2"></div>
  <div class="auth-blob auth-blob-3"></div>
</div>
<div class="auth-container">
  <div class="auth-hero">
    <div class="auth-logo">🗂️</div>
    <h1 class="auth-title">Fam ETC</h1>
    <p class="auth-subtitle">The etcetera hub for your family — school calendars, homework, activities, goals, and family chat in one place.</p>
  </div>
  <div class="auth-card" style="text-align:center">
    <p style="margin-bottom:20px;color:var(--text-muted);font-weight:700">Start with a free 30-day trial. No card required.</p>
    <a href="/signup" class="btn-primary full-width" style="display:block;text-decoration:none;margin-bottom:12px">Get started 🚀</a>
    <a href="/login" class="btn-secondary full-width" style="display:block;text-decoration:none">Sign in</a>
    <p class="demo-hint" style="margin-top:22px">
      <a href="/pricing" style="color:var(--primary);font-weight:700">Pricing</a> ·
      <a href="/help" style="color:var(--primary);font-weight:700">Help</a> ·
      <a href="/privacy" style="color:var(--primary);font-weight:700">Privacy</a> ·
      <a href="/terms" style="color:var(--primary);font-weight:700">Terms</a>
    </p>
  </div>
</div>

</body>
</html>
